<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-Tel_Aviv & Spacebar Clicker</title>
    <style>
        :root {
            /* Dark Mode as Default */
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --h1-color: #ffffff;
            --p-color: #b0b0b0;
            --accent-color: #5dade2;
            --accent-hover: #3498db;
            --reset-color: #ec7063;
            --reset-hover: #e74c3c;
            --border-color: #5dade2;
            --hint-color: #777;
            --shadow: rgba(0,0,0,0.4);
            --input-bg: #3d3d3d;
            --input-text: #ffffff;
        }

        body.light-mode {
            /* Light Mode Variables */
            --bg-color: #f4f4f9;
            --container-bg: white;
            --text-color: #333;
            --h1-color: #2c3e50;
            --p-color: #555;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --reset-color: #e74c3c;
            --reset-hover: #c0392b;
            --border-color: #3498db;
            --hint-color: #888;
            --shadow: rgba(0,0,0,0.1);
            --input-bg: #ffffff;
            --input-text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px var(--shadow);
            margin-top: 50px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        h1 { color: var(--h1-color); }
        p { color: var(--p-color); }

        .clicker-box {
            margin: 40px 0;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
        }

        #counter {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            margin: 10px 0;
        }

        .timer-display {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--reset-color);
        }

        .settings {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--input-text);
            text-align: center;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s, transform 0.1s;
            margin: 5px;
        }

        #clickBtn {
            background-color: var(--accent-color);
            color: white;
        }
        #clickBtn:hover:not(:disabled) { background-color: var(--accent-hover); }
        #clickBtn:active:not(:disabled) { transform: translateY(2px); }
        #clickBtn:disabled { background-color: #777; cursor: not-allowed; }

        #resetBtn {
            background-color: var(--reset-color);
            color: white;
        }
        #resetBtn:hover { background-color: var(--reset-hover); }

        #themeToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            padding: 8px 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hint {
            font-size: 0.9em;
            color: var(--hint-color);
            margin-top: 10px;
        }
    </style>
</head>
<body class="dark-mode">
    <button id="themeToggle">🌙</button>

    <div class="container">
        <h1>Welcome to GN-Tel_Aviv!</h1>
        <p>This is a paragraph of text on my very first web page. Tel Aviv.</p>

        <div class="clicker-box">
            <h2>Spacebar Clicker</h2>
            
            <div class="settings">
                <label for="timeInput">Set Time (sec):</label>
                <input type="number" id="timeInput" value="10" min="1">
            </div>

            <div class="timer-display">Time Left: <span id="timer">10</span>s</div>
            
            <span id="counter">0</span>
            
            <button id="clickBtn">Click Me!</button>
            <button id="resetBtn">Reset</button>
            
            <p class="hint">Press <strong>Spacebar</strong> or click the button to count!</p>
            <p id="statusMsg" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        let count = 0;
        let timeLeft = 10;
        let timerInterval = null;
        let isGameRunning = false;
        let isGameOver = false;

        const counterDisplay = document.getElementById('counter');
        const timerDisplay = document.getElementById('timer');
        const timeInput = document.getElementById('timeInput');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');
        const themeToggle = document.getElementById('themeToggle');
        const statusMsg = document.getElementById('statusMsg');
        const body = document.body;

        // Sound Logic
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function startGame() {
            isGameRunning = true;
            isGameOver = false;
            timeLeft = parseInt(timeInput.value) || 10;
            timerDisplay.textContent = timeLeft;
            statusMsg.textContent = "Go!";
            timeInput.disabled = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            isGameRunning = false;
            isGameOver = true;
            clickBtn.disabled = true;
            statusMsg.textContent = "Time's up!";
            playBeep();
        }

        function increment() {
            if (isGameOver) return;
            if (!isGameRunning) startGame();
            count++;
            counterDisplay.textContent = count;
        }

        function reset() {
            clearInterval(timerInterval);
            isGameRunning = false;
            isGameOver = false;
            count = 0;
            timeLeft = parseInt(timeInput.value) || 10;
            counterDisplay.textContent = count;
            timerDisplay.textContent = timeLeft;
            clickBtn.disabled = false;
            timeInput.disabled = false;
            statusMsg.textContent = "";
        }

        clickBtn.addEventListener('click', () => {
            increment();
            clickBtn.blur();
        });

        resetBtn.addEventListener('click', () => {
            reset();
            resetBtn.blur();
        });

        timeInput.addEventListener('change', () => {
            if (!isGameRunning) {
                timeLeft = parseInt(timeInput.value) || 10;
                timerDisplay.textContent = timeLeft;
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!e.repeat) {
                    increment();
                }
            }
        });

        // Theme Toggle Logic
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }
            themeToggle.blur();
        });
    </script>
</body>
</html>
