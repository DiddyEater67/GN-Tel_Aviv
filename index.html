<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-Tel_Aviv & Spacebar Clicker</title>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://fonts.cdnfonts.com/s/14352/digital-7.mono.woff') format('woff');
        }

        :root {
            /* Dark Mode as Default */
            --bg-color: #1a1a1a;
            --container-bg: rgba(45, 45, 45, 0.9);
            --text-color: #e0e0e0;
            --h1-color: #ffffff;
            --p-color: #b0b0b0;
            --accent-color: #5dade2;
            --accent-hover: #3498db;
            --reset-color: #ec7063;
            --reset-hover: #e74c3c;
            --border-color: #5dade2;
            --hint-color: #777;
            --shadow: rgba(0,0,0,0.4);
            --input-bg: #3d3d3d;
            --input-text: #ffffff;
            --timer-color: #5dade2;
            --particle-color: #5dade2; /* Explicit color for canvas */
        }

        body.light-mode {
            /* Light Mode Variables */
            --bg-color: #f4f4f9;
            --container-bg: rgba(255, 255, 255, 0.9);
            --text-color: #333;
            --h1-color: #2c3e50;
            --p-color: #555;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --reset-color: #e74c3c;
            --reset-hover: #c0392b;
            --border-color: #3498db;
            --hint-color: #888;
            --shadow: rgba(0,0,0,0.1);
            --input-bg: #ffffff;
            --input-text: #333;
            --timer-color: #3498db;
            --particle-color: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* Fixed background canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: transparent;
        }

        .container {
            position: relative;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--shadow);
            margin-top: 50px;
            transition: background-color 0.3s, box-shadow 0.3s;
            z-index: 1;
        }

        h1 { color: var(--h1-color); }
        p { color: var(--p-color); }

        .clicker-box {
            margin: 40px 0;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
        }

        #counter {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            margin: 10px 0;
        }

        .timer-display {
            font-family: 'Digital', 'Courier New', Courier, monospace;
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--timer-color);
            background: #000;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 5px;
            border: 3px solid #333;
            text-shadow: 0 0 10px var(--timer-color);
        }

        .settings {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--input-text);
            text-align: center;
            font-size: 16px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s, transform 0.1s;
            margin: 5px;
        }

        #clickBtn {
            background-color: var(--accent-color);
            color: white;
        }
        #clickBtn:hover:not(:disabled) { background-color: var(--accent-hover); }
        #clickBtn:active:not(:disabled) { transform: translateY(2px); }
        #clickBtn:disabled { background-color: #777; cursor: not-allowed; }

        #resetBtn {
            background-color: var(--reset-color);
            color: white;
        }
        #resetBtn:hover { background-color: var(--reset-hover); }

        #themeToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            padding: 8px 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .hint {
            font-size: 0.9em;
            color: var(--hint-color);
            margin-top: 10px;
        }
    </style>
</head>
<body class="dark-mode">
    <canvas id="particleCanvas"></canvas>
    <button id="themeToggle">🌙</button>

    <div class="container">
        <h1>Welcome to GN-Tel_Aviv!</h1>
        <p>This is a paragraph of text on my very first web page. Tel Aviv.</p>

        <div class="clicker-box">
            <h2>Spacebar Clicker</h2>
            
            <div class="settings">
                <div class="input-group">
                    <label for="minInput">Min:</label>
                    <input type="number" id="minInput" value="0" min="0" max="59">
                </div>
                <div class="input-group">
                    <label for="secInput">Sec:</label>
                    <input type="number" id="secInput" value="10" min="0" max="59">
                </div>
            </div>

            <div class="timer-display" id="timer">00:10</div>
            
            <span id="counter">0</span>
            
            <button id="clickBtn">Click Me!</button>
            <button id="resetBtn">Reset</button>
            
            <p class="hint">Press <strong>Spacebar</strong> or click the button to count!</p>
            <p id="statusMsg" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        // Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 100;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 4 + 1;
                this.speedX = (Math.random() - 0.5) * 0.3; // Very slow movement
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.4 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                const color = getComputedStyle(document.documentElement).getPropertyValue('--particle-color').trim();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        createParticles();
        animateParticles();

        // Game Logic
        let count = 0;
        let totalSeconds = 10;
        let secondsLeft = 10;
        let timerInterval = null;
        let isGameRunning = false;
        let isGameOver = false;

        const counterDisplay = document.getElementById('counter');
        const timerDisplay = document.getElementById('timer');
        const minInput = document.getElementById('minInput');
        const secInput = document.getElementById('secInput');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');
        const themeToggle = document.getElementById('themeToggle');
        const statusMsg = document.getElementById('statusMsg');
        const body = document.body;

        // Sound Logic
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateSettings() {
            const m = parseInt(minInput.value) || 0;
            const s = parseInt(secInput.value) || 0;
            totalSeconds = (m * 60) + s;
            if (totalSeconds <= 0) totalSeconds = 1;
            if (!isGameRunning) {
                secondsLeft = totalSeconds;
                timerDisplay.textContent = formatTime(secondsLeft);
            }
        }

        function startGame() {
            updateSettings();
            isGameRunning = true;
            isGameOver = false;
            statusMsg.textContent = "Go!";
            minInput.disabled = true;
            secInput.disabled = true;

            timerInterval = setInterval(() => {
                secondsLeft--;
                timerDisplay.textContent = formatTime(secondsLeft);
                if (secondsLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            isGameRunning = false;
            isGameOver = true;
            clickBtn.disabled = true;
            statusMsg.textContent = "Time's up!";
            playBeep();
        }

        function increment() {
            if (isGameOver) return;
            if (!isGameRunning) startGame();
            count++;
            counterDisplay.textContent = count;
        }

        function reset() {
            clearInterval(timerInterval);
            isGameRunning = false;
            isGameOver = false;
            count = 0;
            updateSettings();
            counterDisplay.textContent = count;
            clickBtn.disabled = false;
            minInput.disabled = false;
            secInput.disabled = false;
            statusMsg.textContent = "";
        }

        clickBtn.addEventListener('click', () => {
            increment();
            clickBtn.blur();
        });

        resetBtn.addEventListener('click', () => {
            reset();
            resetBtn.blur();
        });

        [minInput, secInput].forEach(input => {
            input.addEventListener('change', updateSettings);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!e.repeat) {
                    increment();
                }
            }
        });

        // Theme Toggle Logic
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }
            themeToggle.blur();
        });
    </script>
</body>
</html>
