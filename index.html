<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-Tel_Aviv & Spacebar Clicker</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: white;
            --text-color: #333;
            --h1-color: #2c3e50;
            --p-color: #555;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --reset-color: #e74c3c;
            --reset-hover: #c0392b;
            --border-color: #3498db;
            --hint-color: #888;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --h1-color: #ffffff;
            --p-color: #b0b0b0;
            --accent-color: #5dade2;
            --accent-hover: #3498db;
            --reset-color: #ec7063;
            --reset-hover: #e74c3c;
            --border-color: #5dade2;
            --hint-color: #777;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px var(--shadow);
            margin-top: 50px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        h1 { color: var(--h1-color); }
        p { color: var(--p-color); }

        .clicker-box {
            margin: 40px 0;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
        }

        #counter {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            margin: 10px 0;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s, transform 0.1s;
            margin: 5px;
        }

        #clickBtn {
            background-color: var(--accent-color);
            color: white;
        }
        #clickBtn:hover { background-color: var(--accent-hover); }
        #clickBtn:active { transform: translateY(2px); }

        #resetBtn {
            background-color: var(--reset-color);
            color: white;
        }
        #resetBtn:hover { background-color: var(--reset-hover); }

        #themeToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--accent-color);
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }

        .hint {
            font-size: 0.9em;
            color: var(--hint-color);
            margin-top: 10px;
        }

        a { color: var(--accent-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <button id="themeToggle">Toggle Dark Mode</button>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a paragraph of text on my very first web page. Tel Aviv.</p>
        <p><a href="https://www.w3schools.com" target="_blank">Visit W3Schools for more tutorials</a></p>

        <div class="clicker-box">
            <h2>Spacebar Clicker</h2>
            <span id="counter">0</span>
            <button id="clickBtn">Click Me!</button>
            <button id="resetBtn">Reset</button>
            <p class="hint">Press <strong>Spacebar</strong> or click the button to count!</p>
        </div>
    </div>

    <script>
        let count = 0;
        const counterDisplay = document.getElementById('counter');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Counter Logic
        function increment() {
            count++;
            counterDisplay.textContent = count;
        }

        function reset() {
            count = 0;
            counterDisplay.textContent = count;
        }

        clickBtn.addEventListener('click', () => {
            increment();
            clickBtn.blur();
        });

        resetBtn.addEventListener('click', () => {
            reset();
            resetBtn.blur();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!e.repeat) {
                    increment();
                }
            }
        });

        // Theme Toggle Logic
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            themeToggle.blur();
        });
    </script>
</body>
</html>
