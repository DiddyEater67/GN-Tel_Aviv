<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GN-Tel_Aviv & Spacebar Clicker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 50px;
        }
        h1 { color: #2c3e50; }
        p { color: #555; }
        .clicker-box {
            margin: 40px 0;
            padding: 20px;
            border: 2px dashed #3498db;
            border-radius: 8px;
        }
        #counter {
            font-size: 48px;
            font-weight: bold;
            color: #3498db;
            display: block;
            margin: 10px 0;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
            margin: 5px;
        }
        #clickBtn {
            background-color: #3498db;
            color: white;
        }
        #clickBtn:hover { background-color: #2980b9; }
        #clickBtn:active { transform: translateY(2px); }
        #resetBtn {
            background-color: #e74c3c;
            color: white;
        }
        #resetBtn:hover { background-color: #c0392b; }
        .hint {
            font-size: 0.9em;
            color: #888;
            margin-top: 10px;
        }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a paragraph of text on my very first web page. Tel Aviv.</p>
        <p><a href="https://www.w3schools.com" target="_blank">Visit W3Schools for more tutorials</a></p>

        <div class="clicker-box">
            <h2>Spacebar Clicker</h2>
            <span id="counter">0</span>
            <button id="clickBtn">Click Me!</button>
            <button id="resetBtn">Reset</button>
            <p class="hint">Press <strong>Spacebar</strong> or click the button to count!</p>
        </div>
    </div>

    <script>
        let count = 0;
        const counterDisplay = document.getElementById('counter');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');

        function increment() {
            count++;
            counterDisplay.textContent = count;
        }

        function reset() {
            count = 0;
            counterDisplay.textContent = count;
        }

        clickBtn.addEventListener('click', (e) => {
            increment();
            clickBtn.blur(); // Prevent spacebar from triggering button click twice
        });

        resetBtn.addEventListener('click', () => {
            reset();
            resetBtn.blur();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent page scrolling
                // Anti-cheat: only increment if the key is not being held down (repeated)
                if (!e.repeat) {
                    increment();
                }
            }
        });
    </script>
</body>
</html>
